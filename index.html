<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Dejan Dakic — live products, work in progress, and links from my X bio.">
    <meta property="og:title" content="Dejan Dakic — projects">
    <meta property="og:description" content="Live builds, what I am shipping next, and where to connect.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://kidemaestro.github.io/linktree/">
    <meta property="og:image" content="https://kidemaestro.github.io/linktree/assets/social-card.svg">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Dejan Dakic — projects">
    <meta name="twitter:description" content="Live builds, what I am shipping next, and where to connect.">
    <meta name="twitter:image" content="https://kidemaestro.github.io/linktree/assets/social-card.svg">
    <meta name="theme-color" content="#101623">
    <link rel="canonical" href="https://kidemaestro.github.io/linktree/">
    <title>Dejan Dakic — projects</title>
    <link rel="icon" href="assets/favicon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="assets/styles.css">
  </head>
  <body>
    <div class="page-shell">
      <main id="app" class="site" aria-live="polite">
        <section class="hero" aria-labelledby="profile-name">
          <div class="avatar" id="profile-avatar" aria-hidden="true"></div>
          <p class="eyebrow" id="profile-handle"></p>
          <h1 id="profile-name"></h1>
          <p class="hero-copy" id="profile-tagline"></p>
          <div class="hero-actions" id="hero-actions"></div>
          <p id="profile-changelog" class="hero-changelog" hidden></p>
        </section>

        <section class="section-block" aria-labelledby="published-heading">
          <div class="section-heading">
            <p class="eyebrow">Live and published</p>
            <h2 id="published-heading">Projects people can try now</h2>
          </div>
          <div id="published-projects" class="project-grid"></div>
        </section>

        <section class="section-block" aria-labelledby="ongoing-heading">
          <div class="section-heading">
            <p class="eyebrow">In progress</p>
            <h2 id="ongoing-heading">Ongoing projects and experiments</h2>
          </div>
          <div id="ongoing-projects" class="project-grid"></div>
        </section>

        <footer class="footer">
          <nav id="social-links" class="social-links" aria-label="Social links"></nav>
          <p id="last-updated" class="last-updated"></p>
        </footer>
      </main>
    </div>

    <script src="data/site.js"></script>
    <script src="assets/script.js"></script>
  </body>
</html>
